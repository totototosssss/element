<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Elements</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="menu-screen" class="screen active">
            <h1>Element Quiz</h1>
            
            <div class="mode-select">
                <label><input type="radio" name="range" value="60" checked> 1-60</label>
                <label><input type="radio" name="range" value="all"> All (118)</label>
                <label><input type="radio" name="range" value="mistakes"> Mistakes</label>
            </div>

            <button onclick="startMode('quiz')">Start Quiz (Type)</button>
            <button onclick="startMode('study')" class="outline-btn">View Mode (Card)</button>
            
            <p id="stats-msg" class="stats"></p>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="nav">
                <button onclick="goHome()">Menu</button>
                <span id="quiz-progress">0/0</span>
            </div>

            <div class="card">
                <div class="atomic-num" id="q-num"></div>
                <div class="symbol" id="q-sym"></div>
            </div>

            <div class="input-area">
                <input type="text" id="answer-input" placeholder="English Name" autocomplete="off">
                <button id="submit-btn" onclick="checkAnswer()">Answer</button>
            </div>
            
            <div id="result-msg"></div>
        </div>

        <div id="study-screen" class="screen">
            <div class="nav">
                <button onclick="goHome()">Menu</button>
                <span id="study-progress">0/0</span>
            </div>

            <div class="card" onclick="toggleStudyCard()">
                <div class="atomic-num" id="s-num"></div>
                <div class="symbol" id="s-sym"></div>
                <div class="answer-text" id="s-ans" style="display:none;"></div>
                <div class="hint">Tap to Show Answer</div>
            </div>

            <div class="controls">
                <button onclick="nextCard()">Next &rarr;</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
